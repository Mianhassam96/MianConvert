<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MianConvert - Video Converter</title>
    <meta name="description" content="Convert, compress, trim and process videos entirely in your browser. Free, fast, private." />
    <meta name="author" content="MianConvert" />
    <meta property="og:title" content="MianConvert" />
    <meta property="og:description" content="Free browser-based video converter" />
    <meta property="og:image" content="/MianConvert/og-image.png" />
    <!-- Required for FFmpeg WASM SharedArrayBuffer support on GitHub Pages -->
    <script>
      if (!crossOriginIsolated) {
        // Service worker based COOP/COEP shim for hosts that don't support custom headers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/MianConvert/sw-coi.js').then(() => {
            if (!sessionStorage.getItem('coi-reloaded')) {
              sessionStorage.setItem('coi-reloaded', '1');
              location.reload();
            }
          });
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
