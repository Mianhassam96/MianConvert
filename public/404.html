<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MianConvert</title>
    <script>
      // SPA redirect for GitHub Pages — preserves path on hard refresh / direct URL
      const base = '/MianConvert';
      const path = window.location.pathname.replace(base, '') || '/';
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(base + '/?p=' + encodeURIComponent(path + search) + hash);
    </script>
  </head>
  <body></body>
</html>
